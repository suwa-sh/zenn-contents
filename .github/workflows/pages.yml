name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'articles/**'
      - 'books/**'
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Cache build artifacts (Astro / OGP / fonts)
        uses: actions/cache@v5
        with:
          path: |
            site/node_modules/.astro
            site/public/og
            site/scripts/.font-cache
          key: build-${{ runner.os }}-${{ hashFiles('site/package-lock.json', 'site/scripts/gen-ogp.mjs', 'site/src/lib/articles.mjs', 'site/src/lib/books.mjs', 'articles/**/*.md', 'books/**/*') }}
          restore-keys: |
            build-${{ runner.os }}-
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
